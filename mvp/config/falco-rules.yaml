# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  NATS STREAM ADDITION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Add a stream for Falco events:
#
#  nats stream add FALCO_ALERTS \
#    --subjects "cicdecoy.security.falco.>" \
#    --retention limits \
#    --max-bytes 536870912 \
#    --max-age 720h \
#    --storage file \
#    --discard old \
#    --replicas 1
#
#  nats consumer add FALCO_ALERTS falco-correlator \
#    --filter "cicdecoy.security.falco.>" \
#    --deliver all \
#    --ack explicit \
#    --wait 15s \
#    --max-deliver 5 \
#    --max-pending 500
#
#  The CTI pipeline subscribes to this consumer and correlates
#  Falco alerts with concurrent decoy sessions by matching
#  pod name and timestamp.


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  CTI PIPELINE CORRELATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  When a Falco alert arrives for a decoy pod, the correlator:
#
#  1. Extracts the pod name from the Falco output fields
#  2. Queries active sessions for that pod
#  3. Enriches the session with the escape attempt data:
#     - ATT&CK mapping: T1611 (Escape to Host)
#     - Engage mapping: deception_maintained = false
#     - Severity: CRITICAL
#  4. Fires an immediate alert with both the application-layer
#     context (what the attacker did in the decoy) and the
#     kernel-layer context (how they tried to escape)
#
#  This gives IR teams the complete picture:
#    "Attacker at 45.33.32.156 SSHed into bastion-dmz-01,
#     ran 14 commands (credential access, lateral movement),
#     then detected containerization via /proc/1/cgroup and
#     attempted escape via mount syscall at 14:07:33 UTC."
#
#  The Engage outcome for this session would show:
#    - Activities exercised: Pocket Lure, Network Monitoring
#    - Deception maintained: false (attacker detected the honeypot)
#    - Intelligence value: critical (escape attempt reveals
#      advanced capability and container escape tradecraft)
