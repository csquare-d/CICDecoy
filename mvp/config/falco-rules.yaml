#      - /etc/falco/falco_rules.yaml
#      - /etc/falco/rules.d/cicdecoy-rules.yaml   # Our custom rules
#    json_output: true
#    json_include_output_property: true
#    log_level: info
#
#  customRules:
#    cicdecoy-rules.yaml: |
#      # Paste the rules above here, or mount via ConfigMap
#
#  falcosidekick:
#    enabled: true
#    config:
#      nats:
#        hostport: "nats.cicdecoy-system.svc.cluster.local:4222"
#        minimumpriority: "warning"
