<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In - {{ company_name }}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f6f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { width: 400px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 40px 36px; }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .brand p { font-size: 14px; color: #6b7280; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; transition: border-color .15s; }
  .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .btn-primary { display: block; width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { background: #1d4ed8; }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; }
  .links { display: flex; justify-content: space-between; margin-top: 20px; }
  .links a { font-size: 13px; color: #2563eb; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #9ca3af; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="brand">
      <h1>{{ company_name }}</h1>
      <p>Sign in to your account</p>
    </div>
    {% if error_message %}
    <div class="error-msg">{{ error_message }}</div>
    {% endif %}
    <form method="post">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="user@{{ company_name | lower | replace(' ', '') }}.com" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
      <div class="links">
        <a href="#">Forgot password?</a>
        <a href="#">Need help?</a>
      </div>
    </form>
  </div>
  <p class="footer">&copy; {{ company_name }}. All rights reserved.</p>
</div>
</body>
</html>
