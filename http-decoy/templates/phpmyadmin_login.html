<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phpMyAdmin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #e7e9ed; color: #333; }
        .header { background: #3a7bd5; padding: 10px 20px; color: #fff; font-size: 18px; font-weight: bold; }
        .header span { font-size: 12px; font-weight: normal; opacity: 0.85; margin-left: 8px; }
        .container { max-width: 420px; margin: 40px auto; background: #fff; border: 1px solid #c4cad0; border-radius: 4px; }
        .title-bar { background: #f5f5f5; border-bottom: 1px solid #ddd; padding: 10px 16px; font-size: 14px; font-weight: bold; color: #333; }
        .form-body { padding: 20px 24px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 7px 10px; border: 1px solid #aab; border-radius: 3px; font-size: 13px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3a7bd5; }
        .btn { padding: 8px 24px; background: #3a7bd5; color: #fff; border: none; border-radius: 3px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #2e6bc4; }
        .error { background: #fdecea; border: 1px solid #e57373; color: #c62828; padding: 8px 12px; border-radius: 3px; margin-bottom: 14px; font-size: 13px; }
        .note { font-size: 11px; color: #888; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="header">phpMyAdmin <span>4.9.11</span></div>
    <div class="container">
        <div class="title-bar">Welcome to phpMyAdmin</div>
        <div class="form-body">
            {% if error_message %}<div class="error">{{ error_message }}</div>{% endif %}
            <form method="POST">
                <input type="hidden" name="_csrf" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="pma_username">Username</label>
                    <input type="text" id="pma_username" name="pma_username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="pma_password">Password</label>
                    <input type="password" id="pma_password" name="pma_password" autocomplete="current-password" required>
                </div>
                <div class="form-group">
                    <label for="pma_serverchoice">Server Choice</label>
                    <select id="pma_serverchoice" name="pma_serverchoice">
                        <option value="1">MySQL (localhost)</option>
                        <option value="2">MySQL (db-primary:3306)</option>
                        <option value="3">MySQL (db-replica:3306)</option>
                    </select>
                </div>
                <button type="submit" class="btn">Go</button>
            </form>
            <p class="note">Cookies must be enabled past this point.</p>
        </div>
    </div>
</body>
</html>
