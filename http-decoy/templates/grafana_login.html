<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: #161719; color: #d8d9da; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-wrapper { width: 340px; }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo-text { font-size: 32px; font-weight: 600; color: #ff6600; letter-spacing: -0.5px; }
        .logo-sub { font-size: 14px; color: #8e8e8e; margin-top: 4px; }
        .card { background: #1f1f20; border-radius: 4px; padding: 28px 24px; }
        .card h2 { font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 20px; color: #ececec; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; color: #8e8e8e; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 9px 12px; background: #0b0c0e; border: 1px solid #2c2d2f; border-radius: 3px; color: #d8d9da; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #ff6600; }
        .btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #ff6600, #f5520f); color: #fff; border: none; border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .error { background: rgba(224,47,68,0.12); border: 1px solid #e02f44; color: #e02f44; padding: 9px 12px; border-radius: 3px; margin-bottom: 16px; font-size: 13px; text-align: center; }
        .footer { text-align: center; margin-top: 16px; font-size: 12px; color: #555; }
        .footer a { color: #ff6600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo">
            <div class="logo-text">Grafana</div>
            <div class="logo-sub">Welcome to Grafana</div>
        </div>
        <div class="card">
            <h2>Sign In</h2>
            {% if error_message %}<div class="error">{{ error_message }}</div>{% endif %}
            <form method="POST">
                <div class="form-group">
                    <label for="user">Email or username</label>
                    <input type="text" id="user" name="user" placeholder="admin" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn">Log in</button>
            </form>
        </div>
        <div class="footer">Forgot your password? <a href="#">Reset</a></div>
    </div>
</body>
</html>
