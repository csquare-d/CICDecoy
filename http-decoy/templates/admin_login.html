<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #eef1f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #fff; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); padding: 36px 32px; width: 360px; }
        .login-box h1 { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 6px; color: #1a1a2e; }
        .subtitle { text-align: center; font-size: 13px; color: #777; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ccd0d5; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #4a6cf7; box-shadow: 0 0 0 2px rgba(74,108,247,0.15); }
        .btn { width: 100%; padding: 11px; background: #4a6cf7; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #3b5de7; }
        .error { background: #fef2f2; border: 1px solid #f87171; color: #b91c1c; padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; }
        .footer { text-align: center; margin-top: 18px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Administration Panel</h1>
        <p class="subtitle">Sign in to continue</p>
        {% if error_message %}<div class="error">{{ error_message }}</div>{% endif %}
        <form method="POST">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="footer">Authorized personnel only</div>
    </div>
</body>
</html>
