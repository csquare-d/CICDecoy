apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: honeytokens.cicdecoy.io
  labels:
    app.kubernetes.io/part-of: cicdecoy
spec:
  group: cicdecoy.io
  names:
    kind: HoneyToken
    listKind: HoneyTokenList
    plural: honeytokens
    singular: honeytoken
    shortNames: [ht]
    categories: [cicdecoy]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Triggered
          type: integer
          jsonPath: .status.triggerCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [aws-key, ssh-key, api-token, database-cred, certificate, kubeconfig, env-var, file]
                value:
                  type: string
                  description: "The token content — auto-generated if omitted"
                placement:
                  type: array
                  items:
                    type: object
                    properties:
                      target:
                        type: string
                        description: "Decoy name or namespace/configmap path"
                      path:
                        type: string
                alertOnAccess:
                  type: boolean
                  default: true
                expiresAfter:
                  type: string
                  description: "Duration string, e.g. 720h"
            status:
              type: object
              properties:
                triggerCount:
                  type: integer
                lastTriggered:
                  type: string
                  format: date-time
                generatedValue:
                  type: string
                  description: "Stored if auto-generated"
---
