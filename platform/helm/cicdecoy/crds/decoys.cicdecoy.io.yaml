apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: decoyfleets.cicdecoy.io
  labels:
    app.kubernetes.io/part-of: cicdecoy
spec:
  group: cicdecoy.io
  names:
    kind: DecoyFleet
    listKind: DecoyFleetList
    plural: decoyfleets
    singular: decoyfleet
    shortNames: [df]
    categories: [cicdecoy]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.readyCount
        - name: Total
          type: integer
          jsonPath: .spec.count
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [count, templateRef]
              properties:
                count:
                  type: integer
                  minimum: 1
                templateRef:
                  type: string
                  description: "Reference to a DecoyTemplate"
                namingPattern:
                  type: string
                  description: "Go template for decoy names, e.g. '{{ .Zone }}-web-{{ .Index }}'"
                zones:
                  type: array
                  items:
                    type: string
                parameterOverrides:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                readyCount:
                  type: string
                decoys:
                  type: array
                  items:
                    type: string
