{{- if .Values.inference.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cicdecoy.fullname" . }}-inference
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
spec:
  replicas: {{ .Values.inference.replicas }}
  selector:
    matchLabels:
      {{- include "cicdecoy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: inference
  template:
    metadata:
      labels:
        {{- include "cicdecoy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: inference
    spec:
      {{- include "cicdecoy.imagePullSecrets" . | nindent 6 }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "cicdecoy.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: inference
                topologyKey: kubernetes.io/hostname
      containers:
        - name: inference
          image: {{ include "cicdecoy.image" (dict "ctx" . "component" .Values.inference "default" "cicdecoy-inference") | quote }}
          imagePullPolicy: {{ include "cicdecoy.imagePullPolicy" (dict "ctx" . "component" .Values.inference) }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.inference.port | int }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.inference.port | int }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.inference.port | int }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources: {{- toYaml .Values.inference.resources | nindent 12 }}
          volumeMounts:
            - name: model-config
              mountPath: /app/config
              readOnly: true
            - name: profiles
              mountPath: /app/profiles
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-config
          configMap:
            name: {{ include "cicdecoy.fullname" . }}-model-config
            optional: true
        - name: profiles
          configMap:
            name: {{ include "cicdecoy.fullname" . }}-profile-dev-workstation
            optional: true
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicdecoy.fullname" . }}-inference
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
spec:
  selector:
    {{- include "cicdecoy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: inference
  ports:
    - name: http
      port: {{ .Values.inference.port | int }}
      targetPort: http
---
# Model config — loaded from files/model-config.yaml
{{- $modelConfig := .Files.Get "files/model-config.yaml" }}
{{- if $modelConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cicdecoy.fullname" . }}-model-config
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
data:
  model-config.yaml: |
    {{- $modelConfig | nindent 4 }}
{{- end }}
{{- end }}
