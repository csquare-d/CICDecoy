{{- if .Values.ctiPipeline.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cicdecoy.fullname" . }}-cti-pipeline
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: cti-pipeline
spec:
  replicas: {{ .Values.ctiPipeline.replicas }}
  selector:
    matchLabels:
      {{- include "cicdecoy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cti-pipeline
  template:
    metadata:
      labels:
        {{- include "cicdecoy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cti-pipeline
    spec:
      {{- include "cicdecoy.imagePullSecrets" . | nindent 6 }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "cicdecoy.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: cti-pipeline
                topologyKey: kubernetes.io/hostname
      initContainers: {{- include "cicdecoy.waitContainers" . | nindent 8 }}
      containers:
        - name: pipeline
          image: {{ include "cicdecoy.image" (dict "ctx" . "component" .Values.ctiPipeline "default" "cicdecoy-cti-pipeline") | quote }}
          imagePullPolicy: {{ include "cicdecoy.imagePullPolicy" (dict "ctx" . "component" .Values.ctiPipeline) }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            {{- include "cicdecoy.dataEnv" . | nindent 12 }}
            - name: NATS_SUBJECTS
              value: {{ .Values.ctiPipeline.subscribeSubjects | quote }}
            - name: PUBLISH_PREFIX
              value: {{ .Values.ctiPipeline.publishPrefix | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.ctiPipeline.logLevel | quote }}
            - name: FALCO_ENABLED
              value: {{ .Values.ctiPipeline.falcoCorrelator.enabled | quote }}
            - name: FALCO_SUBJECT
              value: {{ .Values.ctiPipeline.falcoCorrelator.subject | quote }}
            - name: METRICS_PORT
              value: "9090"
            {{- if .Values.ctiPipeline.geoip.enabled }}
            - name: GEOIP_DB_PATH
              value: /data/geoip/GeoLite2-City.mmdb
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9090
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.ctiPipeline.resources | nindent 12 }}
          volumeMounts:
            - name: engage
              mountPath: /app/config
              readOnly: true
            {{- if .Values.ctiPipeline.geoip.enabled }}
            - name: geoip
              mountPath: /data/geoip
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: engage
          configMap:
            name: {{ include "cicdecoy.fullname" . }}-engage
            optional: true
        {{- if .Values.ctiPipeline.geoip.enabled }}
        - name: geoip
          persistentVolumeClaim:
            claimName: {{ include "cicdecoy.fullname" . }}-geoip
        {{- end }}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicdecoy.fullname" . }}-cti-pipeline
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: cti-pipeline
spec:
  selector:
    {{- include "cicdecoy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cti-pipeline
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
---
{{- if .Values.ctiPipeline.geoip.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cicdecoy.fullname" . }}-geoip
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 256Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cicdecoy.fullname" . }}-geoip-updater
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
spec:
  schedule: "0 4 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
          containers:
            - name: updater
              image: ghcr.io/maxmind/geoipupdate:v7
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: GEOIPUPDATE_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "cicdecoy.fullname" . }}-geoip-credentials
                      key: account_id
                - name: GEOIPUPDATE_LICENSE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "cicdecoy.fullname" . }}-geoip-credentials
                      key: license_key
                - name: GEOIPUPDATE_EDITION_IDS
                  value: "GeoLite2-City"
                - name: GEOIPUPDATE_DB_DIR
                  value: /data/geoip
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: geoip
                  mountPath: /data/geoip
                - name: tmp
                  mountPath: /tmp
          restartPolicy: OnFailure
          volumes:
            - name: geoip
              persistentVolumeClaim:
                claimName: {{ include "cicdecoy.fullname" . }}-geoip
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
{{- end }}
{{- end }}
