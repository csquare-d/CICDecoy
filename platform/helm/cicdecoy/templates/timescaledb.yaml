{{- if .Values.timescaledb.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cicdecoy.fullname" . }}-schema
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
data:
  {{- $schemaFile := .Files.Get "files/schema.sql" }}
  {{- if $schemaFile }}
  01-schema.sql: |
    {{- $schemaFile | nindent 4 }}
  {{- else }}
  01-schema.sql: |
    -- schema.sql not found in helm/cicdecoy/files/
    -- This is an error: the chart ships with a committed copy under files/.
    SELECT 1;
  {{- end }}
  {{- $deltaFile := .Files.Get "files/002_fs_delta.sql" }}
  {{- if $deltaFile }}
  02-delta.sql: |
    {{- $deltaFile | nindent 4 }}
  {{- end }}
{{- if not .Values.timescaledb.auth.existingSecret }}
{{- $dbPassword := include "cicdecoy.db.password" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cicdecoy.fullname" . }}-db-credentials
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  username: {{ .Values.timescaledb.auth.username | quote }}
  password: {{ $dbPassword | quote }}
  database: {{ .Values.timescaledb.auth.database | quote }}
  dsn: {{ printf "postgresql://%s:%s@%s-timescaledb:5432/%s?sslmode=prefer" .Values.timescaledb.auth.username $dbPassword (include "cicdecoy.fullname" .) .Values.timescaledb.auth.database | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cicdecoy.fullname" . }}-timescaledb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: timescaledb
spec:
  serviceName: {{ include "cicdecoy.fullname" . }}-timescaledb
  replicas: {{ .Values.timescaledb.replicas | default 1 | int }}
  selector:
    matchLabels:
      {{- include "cicdecoy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: timescaledb
  template:
    metadata:
      labels:
        {{- include "cicdecoy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: timescaledb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "cicdecoy.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: timescaledb
                topologyKey: kubernetes.io/hostname
      containers:
        - name: timescaledb
          image: {{ printf "%s:%s" .Values.timescaledb.image.repository .Values.timescaledb.image.tag | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_USER
              value: {{ .Values.timescaledb.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cicdecoy.db.secretName" . }}
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.timescaledb.auth.database | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-schema
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources: {{- toYaml .Values.timescaledb.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.timescaledb.auth.username | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.timescaledb.auth.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-schema
          configMap:
            name: {{ include "cicdecoy.fullname" . }}-schema
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.timescaledb.persistence.storageClass }}
        storageClassName: {{ .Values.timescaledb.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.timescaledb.persistence.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicdecoy.fullname" . }}-timescaledb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: timescaledb
spec:
  clusterIP: None
  selector:
    {{- include "cicdecoy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: timescaledb
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
---
{{- if .Values.timescaledb.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cicdecoy.fullname" . }}-db-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-backup
spec:
  schedule: {{ .Values.timescaledb.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
          containers:
            - name: backup
              image: {{ printf "%s:%s" .Values.timescaledb.image.repository .Values.timescaledb.image.tag | quote }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  DUMP_FILE="/backup/cicdecoy-${TIMESTAMP}.sql.gz"
                  echo "[backup] Starting database backup: ${DUMP_FILE}"
                  pg_dump -h {{ include "cicdecoy.fullname" . }}-timescaledb \
                    -U "${PGUSER}" -d "${PGDATABASE}" \
                    --no-owner --no-privileges \
                    | gzip > "${DUMP_FILE}"
                  echo "[backup] Backup complete: $(du -h ${DUMP_FILE} | cut -f1)"
                  # Prune backups older than retention period
                  find /backup -name "cicdecoy-*.sql.gz" -mtime +{{ .Values.timescaledb.backup.retentionDays }} -delete
                  echo "[backup] Pruned backups older than {{ .Values.timescaledb.backup.retentionDays }} days"
              env:
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "cicdecoy.db.secretName" . }}
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "cicdecoy.db.secretName" . }}
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "cicdecoy.db.secretName" . }}
                      key: database
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: tmp
                  mountPath: /tmp
          restartPolicy: OnFailure
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: {{ .Values.timescaledb.backup.existingClaim | default (printf "%s-db-backup" (include "cicdecoy.fullname" .)) }}
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
---
{{- if not .Values.timescaledb.backup.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cicdecoy.fullname" . }}-db-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-backup
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.timescaledb.backup.storageSize | default "5Gi" | quote }}
{{- end }}
{{- end }}
