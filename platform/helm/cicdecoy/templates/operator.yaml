apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator-config
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
data:
  images.yaml: |
    ssh: "{{ include "cicdecoy.image" (dict "ctx" . "component" .Values.sshDecoy "default" "cicdecoy-ssh") }}"
    http: "{{ include "cicdecoy.image" (dict "ctx" . "component" .Values.httpDecoy "default" "cicdecoy-http-decoy") }}"
    telemetrySidecar: "{{ include "cicdecoy.image" (dict "ctx" . "component" .Values.telemetrySidecar "default" "cicdecoy-telemetry") }}"
  operator.yaml: |
    natsUrl: "nats://{{ include "cicdecoy.fullname" . }}-nats:4222"
    inferenceUrl: "http://{{ include "cicdecoy.fullname" . }}-inference:{{ .Values.inference.port }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "cicdecoy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "cicdecoy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "cicdecoy.fullname" . }}-operator
      automountServiceAccountToken: true  # Required: operator needs K8s API access
      {{- include "cicdecoy.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "cicdecoy.fullname" . }}-nats 4222; do echo "Waiting for NATS..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: operator
          image: {{ include "cicdecoy.image" (dict "ctx" . "component" .Values.operator "default" "cicdecoy-operator") | quote }}
          imagePullPolicy: {{ include "cicdecoy.imagePullPolicy" (dict "ctx" . "component" .Values.operator) }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --log-level={{ .Values.operator.logLevel | default "info" }}
            - --metrics-port={{ .Values.operator.metricsPort | default 8080 | int }}
            - --leader-elect=true
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INFERENCE_URL
              value: "http://{{ include "cicdecoy.fullname" . }}-inference:{{ .Values.inference.port }}"
            {{- include "cicdecoy.dataEnv" . | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.operator.metricsPort | default 8080 | int }}
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/cicdecoy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "cicdecoy.fullname" . }}-operator-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
