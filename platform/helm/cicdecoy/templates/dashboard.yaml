{{- if .Values.dashboard.enabled }}
{{- /*
  Resolve the dashboard API-key Secret reference.
  Priority:
    1. .Values.dashboard.auth.existingSecret (user-provided Secret)
    2. .Values.dashboard.auth.apiKey         (literal in values.yaml)
    3. Auto-generated Secret "<fullname>-dashboard-auth"
       (lookup preserves the existing key across `helm upgrade`).
  The backend reads DASHBOARD_API_KEY from env; all branches converge on a
  secretKeyRef so the plaintext is never inlined into the Deployment spec.
*/ -}}
{{- $auth := .Values.dashboard.auth | default dict -}}
{{- $autoSecretName := printf "%s-dashboard-auth" (include "cicdecoy.fullname" .) -}}
{{- $secretName := "" -}}
{{- $secretKey  := "api-key" -}}
{{- $generate   := false -}}
{{- if $auth.existingSecret -}}
  {{- $secretName = $auth.existingSecret -}}
{{- else if $auth.apiKey -}}
  {{- $secretName = $autoSecretName -}}
  {{- $generate = true -}}
{{- else -}}
  {{- $secretName = $autoSecretName -}}
  {{- $generate = true -}}
{{- end -}}
{{- if $generate }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $autoSecretName -}}
{{- $existingKey := "" -}}
{{- if and $existing $existing.data -}}
  {{- $raw := index $existing.data "api-key" | default "" -}}
  {{- if $raw -}}
    {{- $existingKey = b64dec $raw -}}
  {{- end -}}
{{- end -}}
{{- $apiKey := default (default (randAlphaNum 32) $existingKey) $auth.apiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $autoSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-auth
type: Opaque
data:
  api-key: {{ $apiKey | b64enc | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cicdecoy.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "cicdecoy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "cicdecoy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      initContainers: {{- include "cicdecoy.waitContainers" . | nindent 8 }}
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy | default "IfNotPresent" }}
          env:
            {{- include "cicdecoy.dataEnv" . | nindent 12 }}
            - name: NATS_SUBJECTS
              value: {{ .Values.dashboard.natsSubjects | quote }}
            - name: DASHBOARD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $secretKey }}
            {{- if $auth.required }}
            - name: DASHBOARD_REQUIRE_AUTH
              value: "true"
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicdecoy.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    {{- include "cicdecoy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
      {{- if and (eq .Values.dashboard.service.type "NodePort") .Values.dashboard.service.nodePort }}
      nodePort: {{ .Values.dashboard.service.nodePort }}
      {{- end }}
---
{{- if .Values.dashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cicdecoy.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
  {{- with .Values.dashboard.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.dashboard.ingress.className }}
  ingressClassName: {{ .Values.dashboard.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.dashboard.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cicdecoy.fullname" . }}-dashboard
                port:
                  number: {{ .Values.dashboard.service.port }}
  {{- if .Values.dashboard.ingress.tls }}
  tls:
    - hosts: [{{ .Values.dashboard.ingress.host }}]
      secretName: {{ .Values.dashboard.ingress.tlsSecret }}
  {{- end }}
{{- end }}
{{- end }}
