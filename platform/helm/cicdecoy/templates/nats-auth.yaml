{{- if and .Values.nats.enabled .Values.nats.auth.enabled (not .Values.nats.existingSecret) }}
{{- $secretName := printf "%s-nats-auth" (include "cicdecoy.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingToken := "" -}}
{{- if and $existing $existing.data -}}
  {{- $raw := index $existing.data "token" | default "" -}}
  {{- if $raw -}}
    {{- $existingToken = b64dec $raw -}}
  {{- end -}}
{{- end -}}
{{- $token := default (default (randAlphaNum 32) $existingToken) .Values.nats.auth.token -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats-auth
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
{{- end }}
