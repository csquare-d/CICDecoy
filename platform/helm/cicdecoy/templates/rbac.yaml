apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
---
# ── Cluster-scoped RBAC ─────────────────────────────────
# The operator must watch/manage Decoy CRDs across all namespaces
# (decoy fleet deployments span multiple namespaces). CRDs are
# cluster-scoped resources, so a ClusterRole is required.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
rules:
  # Decoy CRs — cluster-wide watch + management
  - apiGroups: ["cicdecoy.io"]
    resources: ["decoys","decoytemplates","honeytokens","decoyprofiles","decoyfleets"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["cicdecoy.io"]
    resources: ["decoys/status","honeytokens/status","decoyfleets/status"]
    verbs: ["get","patch","update"]
  # Namespaces — operator needs to list managed namespaces (labelled
  # cicdecoy.io/managed=true) and create decoy namespaces for fleets
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cicdecoy.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "cicdecoy.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
---
# ── Namespace-scoped RBAC ────────────────────────────────
# Workload resources (pods, deployments, secrets, etc.) are managed
# per-namespace. The operator gets a Role in the release namespace
# and in each managed decoy namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
rules:
  # Core workload resources the operator reconciles per Decoy CR
  - apiGroups: [""]
    resources: ["pods","services","configmaps"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  # Secrets — limited to the verbs the operator actually needs. Deliberately
  # split into its own rule so we can tighten further later without touching
  # the workload rule above. Does NOT grant "deletecollection" or wildcard.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get","list","watch","create","update","patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create","patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get","list","watch","create","update","patch","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cicdecoy.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cicdecoy.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "cicdecoy.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
---
# ── Decoy namespace Roles ────────────────────────────────
# The operator must manage workload resources (pods, deployments,
# secrets, network policies) in each decoy namespace.
{{- range .Values.decoyNamespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cicdecoy.fullname" $ }}-operator
  namespace: {{ . }}
  labels: {{- include "cicdecoy.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods","services","configmaps"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get","list","watch","create","update","patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cicdecoy.fullname" $ }}-operator
  namespace: {{ . }}
  labels: {{- include "cicdecoy.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cicdecoy.fullname" $ }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "cicdecoy.fullname" $ }}-operator
    namespace: {{ $.Release.Namespace }}
---
{{- end }}
