{{- if .Values.ctiPipeline.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cicdecoy.fullname" . }}-cti-pipeline
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicdecoy.labels" . | nindent 4 }}
    app.kubernetes.io/component: cti-pipeline
spec:
  maxUnavailable: {{ .Values.ctiPipeline.pdb.maxUnavailable | default 1 | int }}
  selector:
    matchLabels:
      {{- include "cicdecoy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cti-pipeline
{{- end }}
---
