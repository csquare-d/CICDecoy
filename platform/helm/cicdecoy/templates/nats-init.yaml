{{- if .Values.nats.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cicdecoy.fullname" . }}-nats-init
  namespace: {{ .Release.Namespace }}
  labels: {{- include "cicdecoy.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      initContainers:
        - name: wait-nats
          image: natsio/nats-box:0.19.3
          command: ['sh', '-c']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          {{- if .Values.nats.auth.enabled }}
          env:
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cicdecoy.natsAuthSecretName" . }}
                  key: token
          {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          args:
            - |
              # Wait for NATS TCP
              until nc -z {{ include "cicdecoy.fullname" . }}-nats 4222; do sleep 1; done
              # Wait for JetStream to be ready (retry nats stream ls)
              for i in $(seq 1 30); do
                nats stream ls --server=nats://{{ include "cicdecoy.fullname" . }}-nats:4222 {{- if .Values.nats.auth.enabled }} -u "$NATS_TOKEN"{{- end }} 2>/dev/null && break
                sleep 2
              done
      containers:
        - name: init
          image: natsio/nats-box:0.19.3
          command: ["/bin/sh", "-c"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          {{- if .Values.nats.auth.enabled }}
          env:
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cicdecoy.natsAuthSecretName" . }}
                  key: token
          {{- end }}
          args:
            - |
              set -e
              API="http://{{ include "cicdecoy.fullname" . }}-nats:8222"

              add_stream() {
                local name=$1 subjects=$2 max_age=$3 max_bytes=$4
                echo "Creating stream: $name"
                # Convert human-readable durations to nanoseconds
                local age_ns
                case "$max_age" in
                  72h)  age_ns=259200000000000 ;;
                  168h) age_ns=604800000000000 ;;
                  720h) age_ns=2592000000000000 ;;
                  *)    age_ns=259200000000000 ;;
                esac
                curl -sf -X POST "$API/jsz" >/dev/null 2>&1 || { echo "JetStream not ready"; return 1; }
                # Use NATS CLI with --force flag (available in nats-box 0.19+)
                nats -s "nats://{{ include "cicdecoy.fullname" . }}-nats:4222" \
                  {{- if .Values.nats.auth.enabled }} -u "$NATS_TOKEN" {{- end }} \
                  stream add "$name" \
                  --subjects="$subjects" --storage=file --retention=limits \
                  --max-age="$max_age" --max-bytes="$max_bytes" \
                  --discard=old --replicas=1 --defaults --force 2>&1 \
                || echo "Stream $name may already exist (OK)"
              }

              add_consumer() {
                local stream=$1 name=$2 filter=$3 deliver=$4 max_deliver=$5 max_pending=$6
                echo "Creating consumer: $stream/$name"
                nats -s "nats://{{ include "cicdecoy.fullname" . }}-nats:4222" \
                  {{- if .Values.nats.auth.enabled }} -u "$NATS_TOKEN" {{- end }} \
                  consumer add "$stream" "$name" \
                  --filter="$filter" --deliver="$deliver" --ack=explicit \
                  --max-deliver="$max_deliver" --max-pending="$max_pending" \
                  --defaults --force 2>&1 \
                || echo "Consumer $name may already exist (OK)"
              }

              echo "=== Streams ==="
              add_stream DECOY_EVENTS      "cicdecoy.decoy.events.>"      72h  5368709120
              add_stream ENRICHED_EVENTS   "cicdecoy.enriched.events.>"   72h  5368709120
              add_stream ALERTS            "cicdecoy.alert.>"             168h 1073741824
              add_stream HONEYTOKEN_EVENTS "cicdecoy.honeytoken.>"        720h 1073741824
              add_stream FALCO_ALERTS      "cicdecoy.security.falco.>"    720h 1073741824
              add_stream PLATFORM          "cicdecoy.platform.>"          168h 1073741824
              add_stream SIEM_FORWARDER_DLQ "cicdecoy.siem.dlq"           720h 1073741824

              echo "=== Consumers ==="
              add_consumer DECOY_EVENTS    cti-collector             "cicdecoy.decoy.events.>"      all 5 1000
              add_consumer ENRICHED_EVENTS dashboard-live            "cicdecoy.enriched.events.>"   new 3 500
              add_consumer ALERTS          dashboard-alerts          "cicdecoy.alert.>"             new 3 200
              add_consumer FALCO_ALERTS    falco-correlator          "cicdecoy.security.falco.>"    all 3 200
              add_consumer ENRICHED_EVENTS siem-forwarder            "cicdecoy.enriched.events.>"   all 5 2000
              add_consumer DECOY_EVENTS    siem-forwarder-normalized "cicdecoy.decoy.events.>"      all 5 2000
              add_consumer PLATFORM        health-monitor            "cicdecoy.platform.health.>"   new 3 200

              echo "=== Done ==="
              nats -s "nats://{{ include "cicdecoy.fullname" . }}-nats:4222" \
                {{- if .Values.nats.auth.enabled }} -u "$NATS_TOKEN" {{- end }} \
                stream ls 2>&1
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      restartPolicy: OnFailure
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
{{- end }}
