[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -q
        --cov=../ssh-decoy
        --cov=../cti
        --cov=../dashboard
        --cov=../inference
        --cov-config=../.coveragerc
        --cov-report=term-missing
        --cov-fail-under=60