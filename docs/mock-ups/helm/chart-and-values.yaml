# CI/CDecoy — Helm Chart
# platform/helm/cicdecoy/
#
# Deploys the complete CI/CDecoy platform to a k3s cluster:
# - Decoy Operator (CRD controller)
# - Inference Gateway (LLM service)
# - CTI Pipeline (collector + enrichment + output)
# - NATS JetStream (message bus)
# - TimescaleDB (event storage)
# - Dashboard (web UI)
#
# Install:
#   helm install cicdecoy ./platform/helm/cicdecoy/ \
#     --namespace cicdecoy-system --create-namespace
#
# Install with production overrides:
#   helm install cicdecoy ./platform/helm/cicdecoy/ \
#     -f platform/helm/cicdecoy/values-production.yaml \
#     --namespace cicdecoy-system --create-namespace


# ──────────────────────────────────────────────────────────
#  Chart.yaml
# ──────────────────────────────────────────────────────────

# apiVersion: v2
# name: cicdecoy
# description: >
#   CI/CDecoy — Cyber Deception Platform.
#   Deploy, manage, and monitor high-fidelity decoys using CI/CD
#   workflows on Kubernetes. Generate actionable cyber threat
#   intelligence from attacker interactions.
# type: application
# version: 0.1.0
# appVersion: "0.1.0-alpha"
# kubeVersion: ">=1.26.0-0"
# home: https://github.com/cicdecoy/cicdecoy
# sources:
#   - https://github.com/cicdecoy/cicdecoy
# maintainers:
#   - name: CI/CDecoy Team
#     email: team@cicdecoy.io
# keywords:
#   - deception
#   - honeypot
#   - cybersecurity
#   - threat-intelligence
#   - cti
# dependencies:
#   - name: nats
#     version: "1.1.x"
#     repository: "https://nats-io.github.io/k8s/helm/charts/"
#     condition: nats.enabled
#   - name: timescaledb-single
#     version: "0.33.x"
#     repository: "https://charts.timescale.com/"
#     condition: timescaledb.enabled
#     alias: timescaledb
#   - name: falco
#     version: "4.x"
#     repository: "https://falcosecurity.github.io/charts"
#     condition: falco.enabled


# ──────────────────────────────────────────────────────────
#  values.yaml (default values)
# ──────────────────────────────────────────────────────────
---
global:
  imageRegistry: "ghcr.io/cicdecoy"
  imagePullPolicy: IfNotPresent
  storageClass: "local-path"      # k3s default

# ── Decoy Operator ─────────────────────────────────────
operator:
  enabled: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/decoy-operator"
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # CRD installation
  crds:
    install: true
    keep: true     # Don't delete CRDs on uninstall
  # Leader election for HA
  leaderElection:
    enabled: true
  # Webhook for manifest validation
  webhook:
    enabled: true
    port: 9443
  # ServiceAccount with RBAC
  serviceAccount:
    create: true
    name: "cicdecoy-operator"
    annotations: {}
  # RBAC rules are in templates/operator-rbac.yaml

# ── Inference Gateway ──────────────────────────────────
inference:
  enabled: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/inference-gateway"
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  # LLM backend configuration
  llm:
    backend: "ollama"             # ollama | vllm | openai
    model: "llama3.1:8b"
    url: "http://ollama:11434"    # Internal service URL
    # For external API (e.g., OpenAI-compatible):
    # backend: "openai"
    # url: "https://api.example.com"
    # apiKeySecret: "llm-api-key"
  # Response cache
  cache:
    maxSize: 50000
  # Service
  service:
    type: ClusterIP
    port: 8000
  # Health check
  livenessProbe:
    httpGet:
      path: /v1/health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /v1/health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10

# ── Ollama (local LLM runtime) ────────────────────────
ollama:
  enabled: true                   # Set false if using external LLM
  image:
    repository: ollama/ollama
    tag: "latest"
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
      # nvidia.com/gpu: 1        # Uncomment for GPU support
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "{{ .Values.global.storageClass }}"
  # Model to pull on startup
  models:
    - "llama3.1:8b"
  service:
    type: ClusterIP
    port: 11434

# ── CTI Pipeline ───────────────────────────────────────
cti:
  collector:
    enabled: true
    image:
      repository: "{{ .Values.global.imageRegistry }}/cti-collector"
      tag: "latest"
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  enrichment:
    enabled: true
    image:
      repository: "{{ .Values.global.imageRegistry }}/cti-enrichment"
      tag: "latest"
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    # GeoIP database
    geoip:
      enabled: true
      accountId: ""
      licenseKey: ""
      # Or mount from existing secret:
      existingSecret: ""

  output:
    enabled: true
    image:
      repository: "{{ .Values.global.imageRegistry }}/cti-output"
      tag: "latest"
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    # TAXII server
    taxii:
      enabled: true
      port: 9443
    # SIEM integration
    siem:
      enabled: false
      type: ""                    # splunk | elastic | sentinel
      endpoint: ""
      indexName: "cicdecoy"
      # credentialSecret: ""

# ── Dashboard ──────────────────────────────────────────
dashboard:
  enabled: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/dashboard"
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    className: "traefik"          # k3s default ingress
    annotations: {}
    hosts:
      - host: cicdecoy.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ── NATS JetStream ─────────────────────────────────────
nats:
  enabled: true
  # See message bus spec for detailed NATS configuration.
  # These values are passed to the NATS Helm subchart.
  nats:
    jetstream:
      enabled: true
      memStorage:
        enabled: true
        size: 256Mi
      fileStorage:
        enabled: true
        size: 20Gi
        storageClassName: "{{ .Values.global.storageClass }}"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ── TimescaleDB ────────────────────────────────────────
timescaledb:
  enabled: true
  # Passed to the TimescaleDB Helm subchart
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  persistence:
    size: 50Gi
    storageClass: "{{ .Values.global.storageClass }}"
  # Database initialization
  postInit:
    - configMap:
        name: cicdecoy-db-init
        # Contains schema.sql

# ── Network Policies ───────────────────────────────────
networkPolicies:
  enabled: true
  # When enabled, creates NetworkPolicy resources that:
  # - Allow decoy pods to reach NATS only
  # - Allow CTI pipeline to reach NATS + TimescaleDB
  # - Allow inference gateway to reach Ollama
  # - Allow dashboard to reach TimescaleDB + NATS
  # - Deny all other inter-pod traffic
  # - Deny decoy-to-decoy communication

# ── Falco (Runtime Security) ─────────────────────────
falco:
  enabled: true
  # eBPF driver — no kernel module needed, runs in kernel sandboxed VM
  driver:
    kind: ebpf
  falco:
    rules_file:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/rules.d/cicdecoy-rules.yaml
    json_output: true
    json_include_output_property: true
    log_level: info
  # Custom rules for decoy escape detection
  # (loaded from platform/falco/cicdecoy-rules.yaml)
  customRules:
    cicdecoy-rules.yaml: ""   # Populated from ConfigMap in templates
  # falcosidekick routes alerts to NATS
  falcosidekick:
    enabled: true
    config:
      nats:
        hostport: "nats.cicdecoy-system.svc.cluster.local:4222"
        minimumpriority: "warning"
  # Only monitor decoy namespaces — keeps signal clean
  collectors:
    kubernetes:
      enabled: true
      namespaces:
        - decoys-production
        - decoys-staging

# ── Monitoring ─────────────────────────────────────────
monitoring:
  enabled: false
  # When enabled, deploys:
  # - Prometheus ServiceMonitors for all components
  # - Grafana dashboards (as ConfigMaps)
  prometheus:
    serviceMonitor:
      enabled: true
      interval: 30s
  grafana:
    dashboards:
      enabled: true

# ── Decoy Namespaces ──────────────────────────────────
decoyNamespaces:
  # Create dedicated namespaces for decoy deployment
  create: true
  namespaces:
    - name: decoys-production
      labels:
        cicdecoy.io/purpose: decoys
        cicdecoy.io/env: production
    - name: decoys-staging
      labels:
        cicdecoy.io/purpose: decoys
        cicdecoy.io/env: staging

# ── Node Labels ────────────────────────────────────────
# For proper scheduling, label nodes before install:
#   kubectl label node <name> cicdecoy.io/role=platform
#   kubectl label node <name> cicdecoy.io/role=decoy-node
nodeLabeling:
  advisory: true    # Print labeling instructions in NOTES.txt


