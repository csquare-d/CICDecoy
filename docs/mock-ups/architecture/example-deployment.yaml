# CI/CDecoy — Example Deployment
# DMZ Threat Hunting Campaign
#
# This manifest deploys a convincing developer jump box in the DMZ
# with embedded honeytokens and high-fidelity LLM-backed interaction.
# It's designed to attract and deeply engage attackers who have
# breached the perimeter.

apiVersion: cicdecoy.io/v1alpha1
kind: DecoyProfile
metadata:
  name: dmz-jumpbox-profile
  namespace: decoys-production
spec:
  description: "Senior SRE's bastion host in the DMZ"

  system:
    os: "Ubuntu 22.04.3 LTS"
    kernel: "5.15.0-91-generic"
    hostname: "{{ .decoy.identity.hostname }}"
    uptime: "127 days, 14:03"
    timezone: "America/Chicago"
    locale: "en_US.UTF-8"

  users:
    - name: jmorales
      fullName: "Jordan Morales"
      groups: ["sudo", "docker", "sre-team", "aws-admins"]
      shell: /bin/bash
      lastLogin: "2024-01-18 08:14:22"
    - name: svc-ansible
      fullName: "Ansible Service"
      groups: ["sudo"]
      shell: /bin/bash
      lastLogin: "2024-01-18 03:00:00"
    - name: svc-monitoring
      fullName: "Monitoring Agent"
      groups: ["docker"]
      shell: /usr/sbin/nologin

  software:
    packages:
      - { name: "openssh-server", version: "8.9p1" }
      - { name: "docker-ce", version: "24.0.7" }
      - { name: "ansible", version: "2.15.8" }
      - { name: "terraform", version: "1.6.6" }
      - { name: "kubectl", version: "1.28.4" }
      - { name: "helm", version: "3.13.3" }
      - { name: "awscli", version: "2.15.10" }
      - { name: "python3", version: "3.10.12" }
      - { name: "tmux", version: "3.2a" }
      - { name: "jq", version: "1.6" }
      - { name: "nmap", version: "7.80" }
      - { name: "wireguard-tools", version: "1.0.20210914" }
    services:
      - { name: "sshd", status: "active", port: 22 }
      - { name: "docker", status: "active" }
      - { name: "node_exporter", status: "active", port: 9100 }
      - { name: "wg-quick@wg0", status: "active" }

  environment:
    variables:
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_PROFILE: "prod-admin"
      KUBECONFIG: "/home/jmorales/.kube/config"
      ANSIBLE_INVENTORY: "/opt/ansible/inventory/production"
      VAULT_ADDR: "https://vault.corp.internal:8200"
    crontab:
      - "0 */6 * * * /opt/scripts/cert-renewal.sh >> /var/log/certs.log 2>&1"
      - "30 2 * * * /usr/local/bin/ansible-pull -U git@github.com:corp/infra.git"
      - "*/10 * * * * /opt/monitoring/health-report.sh"

  narrative: |
    This is a bastion/jump host in the DMZ, primarily used by Jordan Morales,
    a senior SRE on the infrastructure team. Jordan uses this box as a gateway
    to manage production Kubernetes clusters, run Ansible playbooks against
    the server fleet, and perform Terraform operations on AWS infrastructure.

    The machine has WireGuard configured for VPN access to the internal network.
    There's a /opt/ansible directory with playbooks and inventory files for the
    full production fleet. AWS credentials under jmorales's home are for the
    prod-admin profile with broad permissions. The .kube/config has contexts for
    three clusters: dev, staging, and production.

    The machine has been running for 127 days since the last kernel update —
    Jordan has been meaning to schedule a maintenance window for patching but
    the upcoming product launch has delayed it. There are occasional Ansible
    runs via cron and manual SSH sessions to production hosts.

    The bash_history should reflect someone who works primarily with k8s,
    AWS, Ansible, and occasionally troubleshoots Docker containers. Jordan
    sometimes uses this box to run nmap scans for internal auditing.

---

