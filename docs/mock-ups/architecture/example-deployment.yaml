apiVersion: cicdecoy.io/v1alpha1
kind: Decoy
metadata:
  name: bastion-dmz-01
  namespace: decoys-production
  labels:
    cicdecoy.io/tier: "3"
    cicdecoy.io/zone: "dmz"
    cicdecoy.io/campaign: "q1-perimeter-hunt"
    cicdecoy.io/role: "bastion"
  annotations:
    cicdecoy.io/description: "High-fidelity SRE bastion in DMZ — primary threat engagement asset"
    cicdecoy.io/owner: "threat-hunt-team"
spec:

  service:
    type: ssh
    port: 22
    additionalPorts:
      - port: 9100
        type: http    # Fake node_exporter metrics endpoint

  fidelity:
    tier: 3
    adaptive:
      profileRef: "dmz-jumpbox-profile"
      inferenceConfig:
        maxSessionTokens: 16384
        temperature: 0.2
        cacheDeterministic: true
      fastPath:
        enabled: true
        commands:
          - match: "^ls"
            source: filesystem
          - match: "^pwd$"
            source: state
          - match: "^whoami$"
            source: state
          - match: "^id$"
            source: state
          - match: "^hostname$"
            source: state
          - match: "^date$"
            source: dynamic    # Return actual current datetime
          - match: "^uptime$"
            source: profile
          - match: "^cat /etc/(passwd|hostname|os-release|issue)"
            source: profile
          - match: "^ps aux"
            source: profile
          - match: "^df -h"
            source: profile
          - match: "^free -[hm]"
            source: profile
      guardrails:
        preventRealCommands: true
        filterPatterns:
          - "(?i)honeypot"
          - "(?i)decoy"
          - "(?i)cicdecoy"
          - "(?i)I('m| am) an AI"
          - "(?i)language model"
          - "(?i)I can('t| not) actually"
          - "(?i)simulated"
        maxResponseLines: 500
        disallowedPaths:
          - "/opt/cicdecoy"
          - "/var/log/decoy"
          - "/etc/cicdecoy"

  identity:
    hostname: "bastion-01"
    domain: "dmz.corp.internal"
    os:
      family: linux
      distribution: "Ubuntu"
      version: "22.04.3 LTS"
      kernel: "5.15.0-91-generic"
      arch: "x86_64"
    network:
      ipStrategy: static
      staticIP: "10.100.0.50"
      macPrefix: "02:42:0a"
      interfaces:
        - name: eth0
          type: ethernet
        - name: wg0
          type: wireguard
    fingerprint:
      tcpWindowSize: 65535
      ttl: 64
      tcpOptions: "mss,nop,nop,sackOK"
      sshBanner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"

  authentication:
    mode: realistic
    credentials:
      - username: jmorales
        password: "Jm0r@les_2024!"
        shell: /bin/bash
        uid: 1000
        home: /home/jmorales
      - username: svc-ansible
        password: "Ans1bl3_SVC#key"
        shell: /bin/bash
        uid: 1001
        home: /home/svc-ansible
    realisticAuth:
      failBeforeSuccess: 1
      lockoutAfter: 8
      lockoutDuration: 600
    logAllAttempts: true

  filesystem:
    base: "ubuntu-22.04-server"
    overlays:
      - type: profile
        profileRef: "dmz-jumpbox-profile"
      - type: inline
        files:
          - path: /home/jmorales/.bash_history
            content: |
              kubectl get pods -n production --context prod-us-east
              kubectl logs -f deployment/api-gateway -n production --context prod-us-east
              ansible-playbook -i /opt/ansible/inventory/production /opt/ansible/playbooks/rolling-update.yml
              ssh db-prod-01.corp.internal
              terraform plan -var-file=production.tfvars
              aws s3 ls s3://corp-prod-artifacts/releases/
              docker ps
              nmap -sV -p 1-1000 10.0.1.0/24
              cat /opt/ansible/inventory/production
              wg show
              curl -s http://localhost:9100/metrics | grep node_cpu
              systemctl status wg-quick@wg0
              journalctl -u sshd --since "1 hour ago"
            permissions: "0600"
            owner: jmorales
          - path: /opt/ansible/inventory/production
            content: |
              [webservers]
              web-prod-01.corp.internal ansible_user=deploy
              web-prod-02.corp.internal ansible_user=deploy
              web-prod-03.corp.internal ansible_user=deploy

              [databases]
              db-prod-01.corp.internal ansible_user=deploy
              db-prod-02.corp.internal ansible_user=deploy

              [cache]
              redis-prod-01.corp.internal ansible_user=deploy

              [monitoring]
              prometheus.corp.internal ansible_user=deploy
              grafana.corp.internal ansible_user=deploy

              [all:vars]
              ansible_ssh_private_key_file=/home/svc-ansible/.ssh/id_rsa
            permissions: "0644"
            owner: svc-ansible
          - path: /opt/ansible/playbooks/rolling-update.yml
            content: |
              ---
              - name: Rolling update for production web fleet
                hosts: webservers
                serial: 1
                become: yes
                tasks:
                  - name: Pull latest container image
                    docker_image:
                      name: "registry.corp.internal/api-gateway:{{ release_tag }}"
                      source: pull
                  - name: Restart application
                    systemd:
                      name: api-gateway
                      state: restarted
                  - name: Wait for health check
                    uri:
                      url: "http://localhost:8080/health"
                      status_code: 200
                    retries: 30
                    delay: 10
            permissions: "0644"
            owner: svc-ansible
      - type: honeytoken
        tokenRefs:
          - "aws-prod-admin-canary"
          - "kubeconfig-prod-canary"
        placements:
          - tokenRef: "aws-prod-admin-canary"
            path: /home/jmorales/.aws/credentials
          - tokenRef: "kubeconfig-prod-canary"
            path: /home/jmorales/.kube/config
    processes:
      - { pid: 1, command: "/sbin/init", user: root }
      - { pid: 452, command: "/usr/sbin/sshd -D", user: root }
      - { pid: 610, command: "/usr/sbin/cron -f", user: root }
      - { pid: 789, command: "/usr/bin/node_exporter", user: svc-monitoring }
      - { pid: 834, command: "/usr/bin/wg-crypt-wg0", user: root }
      - { pid: 1102, command: "/usr/bin/containerd", user: root }
      - { pid: 1198, command: "/usr/bin/dockerd", user: root }

  networkBehavior:
    beaconTraffic:
      enabled: true
      targets:
        - host: "dns.corp.internal"
          port: 53
          protocol: udp
          interval: 30s
        - host: "ntp.corp.internal"
          port: 123
          protocol: udp
          interval: 60s
        - host: "vault.corp.internal"
          port: 8200
          protocol: tcp
          interval: 300s
    dnsRecords:
      enabled: true
      names:
        - "bastion-01.dmz.corp.internal"
        - "jump.corp.internal"
    discoverability:
      arpRespond: true
      pingRespond: true

  telemetry:
    sessionCapture:
      fullTranscript: true
      keystrokeTimings: true
      fileUploads: true
      fileUploadMaxSize: "50Mi"
    exporters:
      - type: nats
        endpoint: "nats://msg-bus.cicdecoy-system:4222"
        subject: "decoy.events.bastion-dmz-01"
      - type: otel
        endpoint: "http://otel-collector.cicdecoy-system:4318"
    alerting:
      immediateAlert:
        - event: auth.success
          severity: high
        - event: honeytoken.accessed
          severity: critical
        - event: command.exec
          patterns:
            - "wget|curl.*http"         # Download attempts
            - "chmod.*\\+x"             # Making files executable
            - "nc.*-e|ncat|socat"       # Reverse shells
            - "/dev/tcp/"               # Bash reverse shell
            - "base64.*decode"          # Encoded payload execution
            - "ssh.*corp\\.internal"    # Lateral movement attempts
            - "ansible-playbook"        # Attempting to use Ansible
            - "terraform.*apply"        # Attempting infra changes
            - "kubectl.*exec"           # Attempting k8s access
            - "aws\\s+(iam|ec2|s3)"     # AWS API usage
          severity: critical
        - event: file.write
          patterns:
            - "/tmp/.*"                 # Dropping tools
            - "/dev/shm/.*"            # Memory-only staging
            - ".*\\.sh$"               # Script creation
          severity: high
      channels:
        - type: webhook
          url: "https://hooks.slack.com/services/T00/B00/threat-hunt-channel"
        - type: siem
          integration: splunk
          index: "deception_alerts"
          sourcetype: "cicdecoy:alert"

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
    scheduling:
      nodeSelector:
        cicdecoy.io/role: "decoy-node"
        cicdecoy.io/zone: "dmz"
      antiAffinity: true

  lifecycle:
    rotation:
      enabled: true
      interval: 336h              # 2 weeks
      strategy: gradual
    healthCheck:
      enabled: true
      interval: 60s
      fingerPrintValidation: true
