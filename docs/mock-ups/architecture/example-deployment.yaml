    values:
      accessKeyId: "AKIAIOSFODNN7CANARY2"
      secretAccessKey: "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"
      region: "us-east-1"
      profiles:
        prod-admin:
          accessKeyId: "AKIAIOSFODNN7CANARY2"
