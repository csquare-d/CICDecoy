# config/dev-decoy.yaml
#
# Standalone config for running the SSH decoy in development.
# Mimics the CRD spec structure so the same parser works for both.

metadata:
  name: ssh-dev-01

spec:
  service:
    type: ssh
    port: 2222

  fidelity:
    tier: 2
    scripted:
      responseSet: "openssh-8.9"
      customResponses:
        - match: "uname -a"
          response: "Linux dev-ws-03 5.15.0-91-generic #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023 x86_64 x86_64 x86_64 GNU/Linux"
        - match: "uname -r"
          response: "5.15.0-91-generic"
        - match: "cat /etc/os-release"
          response: |
            PRETTY_NAME="Ubuntu 22.04.3 LTS"
            NAME="Ubuntu"
            VERSION_ID="22.04"
            VERSION="22.04.3 LTS (Jammy Jellyfish)"
            ID=ubuntu
            ID_LIKE=debian
            HOME_URL="https://www.ubuntu.com/"
            SUPPORT_URL="https://help.ubuntu.com/"
        - match: "cat /etc/hostname"
          response: "dev-ws-03"
    adaptive:
      profileRef: "dev-workstation"
      inferenceConfig:
        maxSessionTokens: 8192
        temperature: 0.3
        endpoint: "http://inference:8000"
      fastPath:
        enabled: true
        commands:
          - match: "^ls"
            source: filesystem
          - match: "^pwd$"
            source: state
          - match: "^whoami$"
            source: state
          - match: "^id$"
            source: state
          - match: "^hostname$"
            source: state
          - match: "^date$"
            source: dynamic
          - match: "^uptime$"
            source: profile
          - match: "^cat /etc/(passwd|hostname|os-release|hosts|issue)"
            source: profile
          - match: "^ps"
            source: profile
          - match: "^df"
            source: profile
          - match: "^free"
            source: profile
          - match: "^docker ps"
            source: profile
          - match: "^docker images"
            source: profile
      guardrails:
        preventRealCommands: true
        filterPatterns:
          - "(?i)honeypot"
          - "(?i)decoy"
          - "(?i)cicdecoy"
          - "(?i)I('m| am) an AI"
          - "(?i)language model"
          - "(?i)I can('t| not) actually"
          - "(?i)simulated"
        maxResponseLines: 500
        disallowedPaths:
          - "/opt/cicdecoy"
          - "/var/log/decoy"

  identity:
    hostname: "dev-ws-03"
    domain: "corp.internal"
    os:
      family: linux
      distribution: "Ubuntu"
      version: "22.04.3 LTS"
      kernel: "5.15.0-91-generic"
    fingerprint:
      sshBanner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
      tcpWindowSize: 65535
      ttl: 64

  authentication:
    mode: selective
    credentials:
      - username: admin
        password: "admin123"
        shell: /bin/bash
        uid: 1000
        home: /home/admin
      - username: deploy
        password: "d3pl0y_2024"
        shell: /bin/bash
        uid: 1001
        home: /home/deploy
      - username: root
        password: "toor"
        shell: /bin/bash
        uid: 0
        home: /root
    logAllAttempts: true

  telemetry:
    sessionCapture:
      fullTranscript: true
      keystrokeTimings: true
    exporters:
      - type: nats
        endpoint: "nats://nats:4222"
        subject: "cicdecoy.decoy.events"
