name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python code
        run: ruff check ssh-decoy/ cti/ dashboard/ inference/ http-decoy/ platform/operator/

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Install component dependencies
        run: |
          pip install pyyaml asyncssh httpx nats-py asyncpg geoip2 pydantic
          pip install fastapi uvicorn sse-starlette

      - name: Run dependency audit (tests)
        run: |
          pip install pip-audit
          pip-audit -r tests/requirements.txt

      - name: Run dependency audit (ssh-decoy)
        run: pip-audit -r ssh-decoy/requirements.txt

      - name: Run dependency audit (cti)
        run: pip-audit -r cti/requirements.txt

      - name: Run dependency audit (dashboard)
        run: pip-audit -r dashboard/requirements.txt

      - name: Run dependency audit (inference)
        run: pip-audit -r inference/requirements.txt

      - name: Run tests with coverage
        run: cd tests && pytest -v --tb=short --cov-report=term-missing --cov-report=xml:../coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Run tests
        working-directory: dashboard
        run: npm test

  go-build:
    name: Go Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: platform/cli
            binary: cicdecoy
          - module: siem-forwarder
            binary: siem-forwarder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Build
        working-directory: ${{ matrix.module }}
        run: CGO_ENABLED=0 go build -o ${{ matrix.binary }} .

  go-build-adapters:
    name: Go Build (adapters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        working-directory: adapters
        run: |
          if [ -f go.mod ]; then
            go vet ./...
          else
            echo "No go.mod found, skipping"
          fi

      - name: Build
        working-directory: adapters
        run: |
          if [ -f go.mod ]; then
            CGO_ENABLED=0 go build ./...
          else
            echo "No go.mod found, skipping"
          fi

  go-test:
    name: Go Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: platform/cli
          - module: siem-forwarder
          - module: adapters
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run tests with coverage
        working-directory: ${{ matrix.module }}
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.module == 'platform/cli' && 'platform-cli' || matrix.module }}
          path: ${{ matrix.module }}/coverage.out

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add NATS repo
        run: helm repo add nats https://nats-io.github.io/k8s/helm/charts/

      - name: Update dependencies
        run: helm dependency build platform/helm/cicdecoy

      - name: Lint chart
        run: helm lint platform/helm/cicdecoy

      - name: Template validation
        run: helm template cicdecoy platform/helm/cicdecoy --debug > /dev/null

  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: ssh-decoy
            context: ssh-decoy
          - image: cti-pipeline
            context: cti
          - image: dashboard
            context: dashboard
          - image: inference
            context: inference
          - image: operator
            context: platform/operator
          - image: siem-forwarder
            context: siem-forwarder
          - image: cli
            context: platform/cli
          - image: adapters
            context: adapters
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: cicdecoy/${{ matrix.image }}:ci

      - name: Export image as tarball
        run: docker save cicdecoy/${{ matrix.image }}:ci -o /tmp/${{ matrix.image }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.image }}
          path: /tmp/${{ matrix.image }}.tar
          retention-days: 1

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

  security-scan:
    name: Security Scan (${{ matrix.image }})
    needs: docker-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ssh-decoy
          - cti-pipeline
          - dashboard
          - inference
          - operator
          - siem-forwarder
          - cli
          - adapters
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ matrix.image }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.image }}.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cicdecoy/${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
