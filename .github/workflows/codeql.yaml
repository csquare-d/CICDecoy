# CodeQL SAST (Static Application Security Testing)
#
# Scans Python and Go source code for security vulnerabilities using
# GitHub's CodeQL analysis engine. Results appear in the GitHub Security
# tab under "Code scanning alerts."
#
# This workflow is intentionally separate from ci.yaml so that:
#   - SAST failures don't block lint/build/test feedback
#   - The weekly schedule can catch newly-published CVE query packs
#     without re-running the full CI pipeline

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 06:00 UTC — picks up new CodeQL query packs
    - cron: "0 6 * * 1"

permissions:
  actions: read            # required for workflow run telemetry
  security-events: write   # required to upload SARIF results
  contents: read           # required to check out the repository

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "go"]
        include:
          - language: python
            setup: actions/setup-python@v5
            version-key: python-version
            version-value: "3.12"
          - language: go
            setup: actions/setup-go@v5
            version-key: go-version
            version-value: "1.22"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------- language toolchain ----------

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      # ---------- Go multi-module dependency verification ----------
      # The repo has 3 independent Go modules with committed go.sum files.
      # Verify dependency checksums before CodeQL analysis.

      - name: Verify Go dependencies
        if: matrix.language == 'go'
        run: |
          for mod in platform/cli siem-forwarder adapters; do
            echo "::group::go mod verify — $mod"
            cd "$mod"
            go mod verify
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done

      # ---------- CodeQL ----------

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          languages: ${{ matrix.language }}
          # Use the default query suite plus security-extended for broader
          # coverage of vulnerability patterns.
          queries: security-extended

      - name: Build Go modules
        if: matrix.language == 'go'
        run: |
          for mod in platform/cli siem-forwarder adapters; do
            echo "::group::go build — $mod"
            cd "$mod"
            go build ./...
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done

      - name: Autobuild
        if: matrix.language == 'python'
        uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          category: codeql-${{ matrix.language }}
